<!DOCTYPE html>
<html>
<head>
    <title>Edit Client</title>
</head>
<body>

<h1>Edit Client</h1>

<form method="POST">
    Name: <input type="text" name="name" value="{{ client['name'] }}"><br><br>
    Phone: <input type="text" name="phone" value="{{ client['phone'] }}"><br><br>

    Service:
    <select name="service">
        <option>{{ client['service'] }}</option>
        <option>Corporate Gifting</option>
        <option>Event Organizing</option>
        <option>Catering</option>
        <option>Photoshoot</option>
        <option>Jobs</option>
        <option>Insurance</option>
        <option>Tutor</option>
    </select><br><br>

    Requirement:<br>
    <textarea name="requirement">{{ client['requirement'] }}</textarea><br><br>

    <button type="submit">Update</button>
</form>

</body>
</html>
