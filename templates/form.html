<!DOCTYPE html>
<html>
<head>
    <title>Client Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h3 class="text-center mb-4">
                {{ 'Edit Client' if client else 'Add Client' }}
            </h3>

            <form method="POST">

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ client.name if client else '' }}" required>
                </div>

                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control"
                           value="{{ client.phone if client else '' }}" required>
                </div>

                <div class="mb-3">
                    <label>Service</label>
                    <input type="text" name="service" class="form-control"
                           value="{{ client.service if client else '' }}">
                </div>

                <div class="mb-3">
                    <label>Requirement</label>
                    <input type="text" name="requirement" class="form-control"
                           value="{{ client.requirement if client else '' }}">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-success">
                        {{ 'Update' if client else 'Add Client' }}
                    </button>

                    <a href="/" class="btn btn-secondary">Back</a>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
